<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 64 64">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#311042" />
      <stop offset="100%" stop-color="#090514" />
    </linearGradient>

    <!-- Core Orb Gradient -->
    <linearGradient id="orb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="40%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow/Neon Effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer Rounded Capsule Container (mimics high-end app icon) -->
  <rect width="64" height="64" rx="18" fill="url(#bg-grad)" filter="url(#shadow)" />
  <rect width="62" height="62" x="1" y="1" rx="17" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />

  <!-- Quantum Nodes / Memory Grid Pattern in background -->
  <g opacity="0.3">
    <circle cx="20" cy="20" r="1" fill="#a78bfa" />
    <circle cx="44" cy="20" r="1" fill="#a78bfa" />
    <circle cx="20" cy="44" r="1" fill="#a78bfa" />
    <circle cx="44" cy="44" r="1" fill="#a78bfa" />
    <line x1="20" y1="20" x2="44" y2="20" stroke="rgba(167, 139, 250, 0.2)" stroke-width="0.5" stroke-dasharray="2 2" />
    <line x1="20" y1="20" x2="20" y2="44" stroke="rgba(167, 139, 250, 0.2)" stroke-width="0.5" stroke-dasharray="2 2" />
    <line x1="44" y1="20" x2="44" y2="44" stroke="rgba(167, 139, 250, 0.2)" stroke-width="0.5" stroke-dasharray="2 2" />
    <line x1="20" y1="44" x2="44" y2="44" stroke="rgba(167, 139, 250, 0.2)" stroke-width="0.5" stroke-dasharray="2 2" />
  </g>

  <!-- Core Glowing Q-Memory Orb -->
  <circle cx="32" cy="32" r="15" fill="url(#orb-grad)" filter="url(#neon-glow)" />

  <!-- Overlapping Translucent Shield (Glassmorphic Effect) -->
  <path d="M32 17 C23.716 17 17 23.716 17 32 C17 40.284 23.716 47 32 47 C35.5 47 38.7 45.8 41.2 43.8 L47 49.6 L49.6 47 L43.8 41.2 C45.8 38.7 47 35.5 47 32 C47 23.716 40.284 17 32 17 Z M32 21 C38.075 21 43 25.925 43 32 C43 38.075 38.075 43 32 43 C25.925 43 21 38.075 21 32 C21 25.925 25.925 21 32 21 Z" fill="rgba(255, 255, 255, 0.85)" filter="url(#shadow)" />

  <!-- Highlighting inner memory processor core -->
  <rect x="29" y="29" width="6" height="6" rx="2.5" fill="#ffffff" filter="url(#neon-glow)" />
</svg>