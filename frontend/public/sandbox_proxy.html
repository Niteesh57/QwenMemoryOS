<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP UI Sandbox</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; }
    </style>
  </head>
  <body>
    <!--
      MCP-UI Sandbox Proxy
      This file acts as the secure sandbox environment for MCP tool UIs.
      It is loaded in a sandboxed iframe by AppRenderer / AppFrame.
      The host sends the actual tool HTML via postMessage after this page
      signals readiness with a "ui/notifications/sandbox-proxy-ready" notification.
      
      Architecture: Host App → AppRenderer → [this sandbox iframe] → Tool HTML
      
      See: https://mcpui.dev/guide/client/overview
    -->
    <script type="module">
      // Import the MCP app-side bridge (bundled with all dependencies).
      // This handles the full MCP protocol handshake with the host application.
      import '/sandbox_proxy_bundle.js';
    </script>

    <script>
      // Notify the host that this sandbox proxy is loaded and ready to receive
      // the tool HTML content via the MCP Apps protocol.
      // This triggers AppBridge.onsandboxready on the host side.
      const readyMsg = {
        jsonrpc: '2.0',
        method: 'ui/notifications/sandbox-proxy-ready',
        params: {}
      };

      // The host (AppFrame) listens for messages on the iframe window
      window.parent.postMessage(readyMsg, '*');

      // Listen for the actual HTML content from the host
      window.addEventListener('message', (event) => {
        // The host will send the tool HTML via the AppBridge protocol
        // The actual injection is handled by the ext-apps App class
        // This listener is supplemental for legacy raw HTML delivery
        if (event.data && event.data.method === 'ui/notifications/sandbox-resource-ready') {
          const html = event.data.params?.html;
          if (html && typeof html === 'string') {
            // Write the received tool HTML into this document
            document.open();
            document.write(html);
            document.close();
          }
        }
      });
    </script>
  </body>
</html>
